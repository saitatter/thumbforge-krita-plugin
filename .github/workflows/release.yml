name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.semantic-release.outputs.released || 'false' }}
      tag: ${{ steps.semantic-release.outputs.tag }}
      version: ${{ steps.semantic-release.outputs.version }}
      commit_sha: ${{ steps.semantic-release.outputs.commit_sha }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Semantic release
        id: semantic-release
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          changelog: true
          github_token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          git_committer_name: github-actions[bot]
          git_committer_email: 41898282+github-actions[bot]@users.noreply.github.com
          build: false

  build-release-assets:
    needs: release
    if: ${{ needs.release.outputs.released == 'true' }}
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.commit_sha }}

      - name: Package Krita plugin
        shell: pwsh
        run: .\scripts\package-krita-plugin.ps1

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: thumbforge-krita-plugin-v${{ needs.release.outputs.version }}.zip
          path: dist/thumbforge-krita-plugin-v${{ needs.release.outputs.version }}.zip

      - name: Upload release asset
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.release.outputs.tag }}" "dist/thumbforge-krita-plugin-v${{ needs.release.outputs.version }}.zip" --clobber
